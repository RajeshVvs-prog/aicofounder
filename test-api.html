<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
        button { padding: 10px 20px; margin: 10px 0; cursor: pointer; background: #ff6600; color: white; border: none; border-radius: 5px; }
        button:hover { background: #cc5200; }
        .result { background: #f5f5f5; padding: 15px; margin: 10px 0; border-radius: 5px; white-space: pre-wrap; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>🧪 API Test Page</h1>
    <p>Test if your API routes are working correctly</p>

    <h2>1. Test Idea Generation</h2>
    <button onclick="testGenerate()">Test Generate API</button>
    <div id="generate-result" class="result"></div>

    <h2>2. Test Validation</h2>
    <button onclick="testValidate()">Test Validate API</button>
    <div id="validate-result" class="result"></div>

    <h2>3. Test Market Research</h2>
    <button onclick="testMarket()">Test Market API</button>
    <div id="market-result" class="result"></div>

    <h2>4. Test Execution Plan</h2>
    <button onclick="testExecution()">Test Execution API</button>
    <div id="execution-result" class="result"></div>

    <script>
        async function testGenerate() {
            const resultDiv = document.getElementById('generate-result');
            resultDiv.textContent = 'Testing...';
            resultDiv.className = 'result';

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        field: 'Education',
                        problemType: 'High costs',
                        targetUsers: 'Students'
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = '✅ SUCCESS!\n\n' + JSON.stringify(data, null, 2);
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = '❌ ERROR: ' + (data.error || 'Unknown error');
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ FETCH ERROR: ' + error.message;
            }
        }

        async function testValidate() {
            const resultDiv = document.getElementById('validate-result');

            try {

                    })
                });

                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = '❌ ERROR: ' + (data.error || 'Unknown error');
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ FETCH ERROR: ' + error.message;
            }
        }

        async function testMarket() {
            const resultDiv = document.getElementById('market-result');
            resultDiv.textContent = 'Testing...';
            resultDiv.className = 'result';

            try {
                const response = await fetch('/api/market', {

                    })

                if (response.ok) {

        async function testExecution() {
            const resultDiv = document.getElementById('execution-result');

            resultDiv.className = 'result';

            try {
                const response = await fetch('/api/execution', {
                    method: 'POST',

                        idea: 'A platform for students to rent textbooks at affordable prices'
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = '✅ SUCCESS!\n\n' + JSON.stringify(data, null, 2);
                } else {
                    resultDiv.className = 'result error';

                }
            } catch (error) {

        }
    </script>
</body>
</html>
